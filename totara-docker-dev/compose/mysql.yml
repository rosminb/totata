x-healthcheck-template: &mysql-healthcheck
  healthcheck:
    test: ["CMD-SHELL", "mysqladmin -u root -p$$MYSQL_ROOT_PASSWORD ping -h 127.0.0.1 2>/dev/null"]
    interval: 5s
    timeout: 5s
    retries: 5
    start_period: 10s

services:

  mysql8:
    <<: *mysql-healthcheck
    image: mysql:8.0
    container_name: totara_mysql8
    restart: ${RESTART_POLICY:-no}
    ports:
      - "3308:3306"
    environment:
      TZ: ${TIME_ZONE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PW}
    depends_on:
      - nginx
    volumes:
      - mysql80-data:/var/lib/mysql
      - ./mysql8:/etc/mysql/conf.d
    networks:
      - totara

  mysql84:
    <<: *mysql-healthcheck
    image: mysql:8.4
    container_name: totara_mysql84
    restart: ${RESTART_POLICY:-no}
    ports:
      - "3309:3306"
    environment:
      TZ: ${TIME_ZONE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PW}
    depends_on:
      - nginx
    volumes:
      - mysql84-data:/var/lib/mysql
      - ./mysql84:/etc/mysql/conf.d
    networks:
      - totara

  mysql57:
    # MySQL 5.7 does not support multiple architectures. (MySQL 8.0 works fine)
    platform: linux/amd64
    <<: *mysql-healthcheck
    image: mysql:5.7
    container_name: totara_mysql57
    restart: ${RESTART_POLICY:-no}
    ports:
      - "3306:3306"
    environment:
      TZ: ${TIME_ZONE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PW}
    depends_on:
      - nginx
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - totara

volumes:
  mysql-data:
  mysql80-data:
  mysql84-data:
