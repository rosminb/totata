include totara/server.conf;

# Here you can define how you want nginx to handle requests made from your local network.
# You can do whatever you want here.


# Allow big uploads
client_max_body_size 1G;

location / {
    # Redirect non-existing files to the front controller for "pretty" URLs.
    # For v21+ installs (public/ webroot), all PHP requests are routed through
    # public/index.php (the front controller).
    # For v13-20 installs the real script exists under server/ and is served directly.
    # $front_controller is /index.php normally, or /<site>/index.php for path-based
    # sites (see server.conf) so SCRIPT_NAME keeps the /<site> prefix.
    try_files $uri $uri/ $front_controller?$query_string;
}

location ~ [^/]\.php(/|$) {
    fastcgi_pass  $upstream:9000;
    include       fastcgi_params;

    fastcgi_send_timeout 300s;
    fastcgi_read_timeout 1d;

    # regex to split $uri to $fastcgi_script_name and $fastcgi_path
    fastcgi_split_path_info ^(.+\.php)(/.+)$;

    fastcgi_param PATH_INFO       $fastcgi_path_info;
    fastcgi_param SCRIPT_NAME     $fastcgi_script_name;

    # For v21+ installs (public/ webroot), route all PHP through the front controller.
    set $script_filename $document_root$fastcgi_script_name;
    if ($use_front_controller) {
        set $script_filename $document_root/index.php;
    }
    fastcgi_param SCRIPT_FILENAME $script_filename;

    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
}

# serve static files directly, fall through to front controller if not found.
# This is needed for v21+ installs where static assets (amd/build/, pix/, fonts/)
# live under server/ not public/, so nginx can't serve them directly.
location ~* ^.+.(jpg|jpeg|gif|css|png|js|ico|html|xml|txt)$ {
    access_log        off;
    expires           max;
    try_files         $uri $front_controller?$query_string;
}
