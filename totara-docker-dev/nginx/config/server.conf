# Match any server name with the format sitename.totaraXX.behat.debug.localhost (where sitename, debug, behat, and localhost are optional)
# The following are valid hostnames:
# - totara83
# - totara83.debug
# - totara83.localhost
# - totara83.debug.localhost
# - totara83.behat
# - totara83.behat.debug
# - totara83.behat.localhost
# - totara83.behat.debug.localhost
# - mysite.totara83
# - mysite.totara83.debug
# - mysite.totara83.localhost
# - mysite.totara83.debug.localhost
# - mysite.totara83.behat
# - mysite.totara83.behat.debug
# - mysite.totara83.behat.localhost
# - mysite.totara83.behat.debug.localhost
server_name ~^(?<sitename>[\w-]+)?(\.)?totara(?<php_major>[0-9])(?<php_minor>[0-9])(?:\.behat)?(\.)?(?<debug>[\w-]+)?(?:\.localhost)?$;

# Dynamically resolve the php version from version passed throught by the server name
set $upstream "php-${php_major}.${php_minor}";
if ($debug = "debug") {
    set $upstream "${upstream}-debug";
}

# Default root
set $base_rootdir "$REMOTE_SRC";

if ($sitename != "") {
    set $base_rootdir $base_rootdir/$sitename;
}

# Path-based multisite support (front-controller / v21+ sites only).
# In addition to the subdomain form (mysite.totara83.localhost/foobar), allow the
# path form totara83.localhost/mysite/foobar.
set $path_site "";
if ($request_uri ~ "^/([\w-]+)") {
    set $path_site $1;
}
# The front controller URI used as the try_files fallback for "pretty"/modern-routed
# URLs that don't map to a real file. For path-based sites it must include the /<site>
# prefix so that, after the internal redirect, SCRIPT_NAME becomes /<site>/index.php
# rather than /index.php.
set $front_controller "/index.php";
set $path_route "${sitename}::";
if (-f "$REMOTE_SRC/$path_site/public/index.php") {
    set $path_route "${sitename}::fc";
}
if ($path_route = "::fc") {
    set $base_rootdir "$REMOTE_SRC/$path_site";
    set $front_controller "/$path_site/index.php";
}

set $use_front_controller 0;
set $rootdir $base_rootdir;

# If we have the server directory (version 13 and newer) use this as the wwwroot
if (-f "$base_rootdir/server/version.php") {
    # in which case, set that directory as the root
    set $rootdir $base_rootdir/server;
}

# If we have the public directory (version 21 and newer) it is a sibling of server/,
# so check from the original sitename root. Re-check against REMOTE_SRC base.
# We use a separate variable to avoid double-appending on the server/ branch.
if (-f $base_rootdir/public/index.php) {
    set $rootdir $base_rootdir/public;
    set $use_front_controller 1;
}

root $rootdir;

ssl_certificate     /etc/nginx/ssl/domain.crt;
ssl_certificate_key /etc/nginx/ssl/domain.key;

http2 on;

index index.php index.html;

charset utf-8;

# this is the internal Docker DNS
resolver 127.0.0.11;

gzip on;
gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
