# Here are the server options that apply to all totara servers, regardless of whether
# they are being accessed locally, or being accessed remotely (via ngrok)

ServerAlias "totara*"
ServerAlias "*.totara*"
ServerAlias "totara*.behat"
ServerAlias "*.totara*.behat"
ServerAlias "totara*.debug"
ServerAlias "*.totara*.debug"
ServerAlias "totara*.behat.debug"
ServerAlias "*.totara*.behat.debug"
ServerAlias "totara*.localhost"
ServerAlias "*.totara*.localhost"
ServerAlias "totara*.behat.localhost"
ServerAlias "*.totara*.behat.localhost"
ServerAlias "totara*.debug.localhost"
ServerAlias "*.totara*.debug.localhost"
ServerAlias "totara*.behat.debug.localhost"
ServerAlias "*.totara*.behat.debug.localhost"

RewriteEngine on

DocumentRoot "$REMOTE_SRC"

# Direct php requests to the php-X.X container.
# Hostname format: [sitename.]totara{major}{minor}[.behat][.debug][.localhost]
# Apply non-debug first, then override with debug if the host contains .debug.
RewriteCond %{HTTP_HOST} totara(\d)(\d)(\.behat)?(\.localhost)?(:[0-9]+)?$
RewriteRule \.php - [H=proxy:fcgi://php-%1.%2:9000]

# Override: direct Xdebug requests to the php-X.X-debug container
RewriteCond %{HTTP_HOST} totara(\d)(\d)(\.behat)?\.debug(\.localhost)?(:[0-9]+)?$
RewriteRule \.php - [H=proxy:fcgi://php-%1.%2-debug:9000]

# Capture the optional sitename prefix from the hostname.
# Matches: sitename.totara84, sitename.totara84.localhost, sitename.totara84.debug, etc.
RewriteCond %{HTTP_HOST} ^([\w-]+)\.totara\d
RewriteRule ^ - [E=SITENAME:%1]

# Path-based multisite support (front-controller / v21+ sites only).
# In addition to the subdomain form (mysite.totara83.localhost/foobar), allow the
# path form totara83.localhost/mysite/foobar. This only applies when no sitename was
# supplied as a subdomain; capture the first path segment as the candidate site.
# Unlike the subdomain form, the /<site> prefix stays in the request URI so that
# SCRIPT_NAME keeps the /<site> prefix once the request reaches the front controller.
RewriteCond %{ENV:SITENAME} ^$
RewriteCond %{REQUEST_URI} ^/([\w-]+)
RewriteRule ^ - [E=PATHSITE:%1]

# v21+ front controller (path form): totara83.localhost/mysite/foobar.
# Checked before the subdomain form below so a real path-based site takes precedence
# over the base site's own front controller. Only matches when the candidate site has
# a public/ webroot (front-controller / v21+ install). The host condition that captures
# the php version is kept last so its %1.%2 backrefs survive into the RewriteRule.
RewriteCond %{HTTP_HOST} !\.debug
RewriteCond %{ENV:PATHSITE} ^.+$
RewriteCond %{DOCUMENT_ROOT}/%{ENV:PATHSITE}/public/index.php -f
RewriteCond %{HTTP_HOST} totara(\d)(\d)
RewriteRule ^ %{DOCUMENT_ROOT}/%{ENV:PATHSITE}/public/index.php [QSA,L,H=proxy:fcgi://php-%1.%2:9000]

# v21+ front controller (path form, debug variant): routes to the debug PHP-FPM container
RewriteCond %{ENV:PATHSITE} ^.+$
RewriteCond %{DOCUMENT_ROOT}/%{ENV:PATHSITE}/public/index.php -f
RewriteCond %{HTTP_HOST} totara(\d)(\d).*\.debug
RewriteRule ^ %{DOCUMENT_ROOT}/%{ENV:PATHSITE}/public/index.php [QSA,L,H=proxy:fcgi://php-%1.%2-debug:9000]

# v21+ (public/ directory exists): route all requests through the front controller.
# The [H=proxy:...] flag is set here (not only for .php URLs) so that requests like /
# or static-looking URLs are also processed by PHP-FPM via public/index.php.
RewriteCond %{HTTP_HOST} totara(\d)(\d)
RewriteCond %{HTTP_HOST} !\.debug
RewriteCond %{DOCUMENT_ROOT}/%{ENV:SITENAME}/public/index.php -f
RewriteRule ^ %{DOCUMENT_ROOT}/%{ENV:SITENAME}/public/index.php [QSA,L,H=proxy:fcgi://php-%1.%2:9000]

# v21+ (debug variant): same but routes to the debug PHP-FPM container
RewriteCond %{HTTP_HOST} totara(\d)(\d).*\.debug
RewriteCond %{DOCUMENT_ROOT}/%{ENV:SITENAME}/public/index.php -f
RewriteRule ^ %{DOCUMENT_ROOT}/%{ENV:SITENAME}/public/index.php [QSA,L,H=proxy:fcgi://php-%1.%2-debug:9000]

# If the server directory exists (version 13 to 20), rewrite to use it
RewriteCond %{DOCUMENT_ROOT}/%{ENV:SITENAME}/public/index.php !-f
RewriteCond %{DOCUMENT_ROOT}/%{ENV:SITENAME}/server/version.php -f
RewriteRule ^(.*)$ %{DOCUMENT_ROOT}/%{ENV:SITENAME}/server$1 [QSA]

# Otherwise (version 12 and older) don't use a subdirectory
RewriteCond %{DOCUMENT_ROOT}/%{ENV:SITENAME}/public/index.php !-f
RewriteCond %{DOCUMENT_ROOT}/%{ENV:SITENAME}/server/version.php !-f
RewriteRule ^(.*)$ %{DOCUMENT_ROOT}/%{ENV:SITENAME}$1 [QSA]

# Don't strip Authorization header
RewriteCond %{HTTP:Authorization} ^(.*)
RewriteRule .* - [e=HTTP_AUTHORIZATION:%1]

# Allow accessing files in the src directory
<Directory $REMOTE_SRC>
    AllowOverride All
    Require all granted
</Directory>

DirectoryIndex index.php index.html

AddDefaultCharset UTF-8

# Enable gzip compression for these file types
AddOutputFilterByType DEFLATE text/plain
AddOutputFilterByType DEFLATE text/css
AddOutputFilterByType DEFLATE application/json
AddOutputFilterByType DEFLATE application/x-javascript
AddOutputFilterByType DEFLATE text/xml
AddOutputFilterByType DEFLATE application/xml
AddOutputFilterByType DEFLATE application/xml+rss
AddOutputFilterByType DEFLATE text/javascript
AddOutputFilterByType DEFLATE image/svg+xml
